name: a11y

on:
  pull_request:
    branches: [master]

jobs:
  axe:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.3
        with:
          version: latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Panda CSS
        run: pnpm prepare

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run axe-core a11y tests
        id: axe
        run: pnpm exec playwright test e2e/a11y
        continue-on-error: true

      - name: Append axe violations to job summary
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const path = require("path");

            const reportDir = "playwright-report";
            const reportFile = path.join(reportDir, "index.html");

            await core.summary.addHeading("a11y (axe-core) results", 2);

            const stepOutcome = "${{ steps.axe.outcome }}";
            await core.summary.addRaw(
              `Playwright step outcome: **${stepOutcome}**\n\n`,
              true,
            );

            // axe の違反内容は Playwright stdout に JSON で出力されるため、
            // 詳細は Actions logs および artifact (playwright-report) を参照する旨を明記する。
            await core.summary.addRaw(
              "Detailed axe-core violations are printed in the Playwright test logs above " +
                "and the uploaded `playwright-report` artifact (see Artifacts section).",
              true,
            );

            if (fs.existsSync(reportFile)) {
              await core.summary.addRaw(
                "\n\nHTML report has been uploaded as the `playwright-report` artifact.",
                true,
              );
            }

            await core.summary.write();

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Fail job if axe step failed
        if: steps.axe.outcome != 'success'
        run: |
          echo "axe-core a11y tests failed. See job summary and playwright-report artifact." >&2
          exit 1
