name: CI

on:
  pull_request:
    branches: [master]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Panda CSS
        run: pnpm prepare

      - name: Run linter
        run: pnpm lint

      - name: Lint design tokens (R-5 / Issue #393)
        run: pnpm lint:tokens

      - name: Check build / build:ci sync (Issue #685)
        run: pnpm check:build-ci-sync

      # Issue #580: tsc --incremental の .tsbuildinfo を cache し、
      # type-check / type-check:test / type-check:scripts / type-check:api の cold ビルドを高速化する。
      # Issue #640: PR #580 では 4 つの .tsbuildinfo を `.tsbuildinfo/` 1 entry でまとめていたため、
      # test ファイル変更で本体 buildinfo の cache key まで invalidate される過剰 invalidation が
      # 発生していた。これを cache entry を「本体 / test / scripts / api」の 4 つに分離することで、
      # それぞれ独立した cache key で部分 invalidate を効かせる構造に変更する。
      # **重要**: 本 cache step 群を変更する際は deploy.yml の同 cache step 群も同期して変更すること。
      # 逆も同様。drift すると ci.yml が warm にした .tsbuildinfo を deploy.yml 側が再利用できず
      # (またはその逆) warm cache が無駄になる。
      #
      # 本体 cache の hashFiles から `src/**/*.{test,spec}.{ts,tsx}` を negation pattern で除外する
      # ことで、test 専用ファイルの変更が本体 cache key に波及しないようにする (Issue #640 の主目的)。
      #
      # restoreKeys 削除の経緯 (Issue #722 follow-up / PR #731):
      #   旧設定では各 entry に `tsc-<entry>-<OS>-<tsconfig-hash>-` および `tsc-<entry>-<OS>-` を
      #   restoreKeys として保持していたが、src/scripts の hash が不一致な過去 cache を fallback で
      #   復元すると、tsc --incremental + --noEmit の semantic diagnostics キャッシュが
      #   古いソースの行番号でエラー報告する問題が観測された
      #   (例: `walkDirectory` の 4 引数版 ↔ 3 引数版を取り違える TS2554)。
      #   src 変更ごとに strict match (key 完全一致) のみで cache 採用するよう、4 entry すべての
      #   restoreKeys を撤去し、stale cache 起因の誤診断を根絶する。trade-off:
      #     - cache hit 率は下がる (master 取り込み等で src hash が変わると毎回 clean build)
      #     - CI 時間増加分は main / test / scripts / api 各 entry で数十秒程度
      #     - 信頼性 > 速度 と判断
      - name: Cache tsc main build info (Issue #640)
        uses: actions/cache@v5
        with:
          path: .tsbuildinfo/tsconfig.tsbuildinfo
          key: tsc-main-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx', '!src/**/*.test.ts', '!src/**/*.test.tsx', '!src/**/*.spec.ts', '!src/**/*.spec.tsx', '!src/api/**', '!src/**/__tests__/**') }}

      # test 側 cache: tsconfig.test.json は tsconfig.json を継承するため、本体ソースの変更でも
      # invalidate する必要がある (本体 + テストファイル両方を hash 対象に含める)。
      - name: Cache tsc test build info (Issue #640)
        uses: actions/cache@v5
        with:
          path: .tsbuildinfo/tsconfig.test.tsbuildinfo
          key: tsc-test-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig.json', 'tsconfig.test.json') }}-${{ hashFiles('src/**/*.ts', 'src/**/*.tsx') }}

      # scripts 側 cache: tsconfig.scripts.json は scripts/ のみを対象 (Issue #634)。
      - name: Cache tsc scripts build info (Issue #640)
        uses: actions/cache@v5
        with:
          path: .tsbuildinfo/tsconfig.scripts.tsbuildinfo
          key: tsc-scripts-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig.json', 'tsconfig.scripts.json') }}-${{ hashFiles('scripts/**/*.ts', 'scripts/**/*.tsx') }}

      # api 側 cache: tsconfig.api.json は src/api/ のみを対象 (Issue #667)。
      # ただし src/api/posts.ts は ../lib/markdownParser を import するため、src/lib も hash 対象に含める。
      - name: Cache tsc api build info (Issue #640)
        uses: actions/cache@v5
        with:
          path: .tsbuildinfo/tsconfig.api.tsbuildinfo
          key: tsc-api-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml', 'tsconfig.json', 'tsconfig.api.json') }}-${{ hashFiles('src/api/**/*.ts', 'src/api/**/*.tsx', 'src/lib/**/*.ts', 'src/lib/**/*.tsx', '!src/**/*.test.ts', '!src/**/*.test.tsx', '!src/**/*.spec.ts', '!src/**/*.spec.tsx', '!src/**/__tests__/**') }}

      - name: Type check
        run: pnpm type-check

      - name: Type check (test)
        run: pnpm type-check:test

      - name: Type check (scripts) (Issue #634)
        run: pnpm type-check:scripts

      # Issue #730: PR #640 で `tsc-api-*` cache step を ci.yml にも追加したが、ci.yml では
      # `type-check:api` を実行する step が無く、cache が read/write されない「片肺運用」に
      # なっていた。`type-check:api` step を追加することで以下を解消する:
      #   - api 型エラーを PR 段階で検知できる (従来は master push 時の deploy.yml まで未検知)
      #   - tsc-api cache を ci.yml ↔ deploy.yml の双方向で活用できる (cache key 整合性の回復)
      - name: Type check (api) (Issue #730)
        run: pnpm type-check:api
