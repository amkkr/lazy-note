name: Panda hash:true regression check

# Issue #496 / Issue #475 の検証で、Tripwire テスト 647 件は `hash: true`
# 有効化でも全 pass することが確認済み。ただし bundle size のメリットは
# 小さい (gzip 後 +5.8%) ため本番は `hash: false` (デフォルト) で運用し、
# regression 検知のため定期 (schedule) / Panda 関連 PR (pull_request paths) /
# 手動 (workflow_dispatch) の 3 系統で実行する。
#
# Issue #526: 元は `workflow_dispatch` のみだったため、手動実行しないと走らず
# 「誰も実行しないまま機能が腐る」リスクがあった (Panda CSS のメジャー更新時や
# Tripwire 命名規則整理 (Issue #477) 完了後など)。dependabot で `@pandacss/dev`
# 更新 PR が頻繁に来るため、検知の頻度確保は重要。本 workflow では:
#   - 案 A (schedule, 月初 cron): 月 1 回の定期検証で機能腐敗リスクを軽減
#   - 案 B (pull_request paths): panda.config.ts / package.json / pnpm-lock.yaml
#     / vite.config.ts / postcss.config.* 変更 PR で即時検知し、dependabot の
#     `@pandacss/dev` 更新 PR 等を捕捉
# の併用方式 (案 A + 案 B) を採用する。CI billing への影響は「月 1 + 該当 PR」
# 程度で、許容範囲。失敗時の通知は GitHub Actions の標準通知 (commit author
# email / fail badge) で当面足りる。Slack / メール / Issue 自動起票は別
# follow-up Issue で扱う (本 PR スコープ外)。
#
# Issue #732: 案 B の paths 選定漏れ補強。Panda CSS の生成挙動に影響する
# 経路として、元の 3 ファイル (panda.config.ts / package.json /
# pnpm-lock.yaml) に加え、以下 2 つを paths に含める。
#   - vite.config.ts: Vite と Panda の組み込み経路。現状の vite.config.ts は
#     Panda の postcss プラグインを明示的に記述していない (Panda CLI 直接実行
#     方式) が、将来 PostCSS パイプライン経由に切り替える / Vite plugin 経由に
#     変える変更が入った場合に即時検知できるよう、予防的に paths に含める
#   - postcss.config.*: PostCSS パイプライン定義ファイル。現状 repo には実在
#     しないが、将来追加された PR を捕捉するため予防的に paths に登録する
#     (glob は `postcss.config.js` / `.ts` / `.cjs` / `.mjs` 等の全ての拡張子に
#     マッチする)。実在しないファイルを paths に含めても GitHub Actions は
#     エラーにならず、対象ファイルが PR に含まれた瞬間に自動 trigger される。
#
# panda.config.ts の書き換えは CI の working tree 上のみで行い、リポジトリには
# commit / push しない。

on:
  workflow_dispatch:
  # 案 A: 月初 00:00 UTC に定期実行。@pandacss/dev のメジャー更新等で気づか
  # ないうちに hash:true 耐性が劣化していないかを月 1 で検知する。cron は
  # UTC 基準で動くため、JST では月初 09:00 相当 (DST なし)。
  schedule:
    - cron: "0 0 1 * *"
  # 案 B: Panda の依存バージョン / 設定変更を伴う PR を即時検知する。
  # dependabot による `@pandacss/dev` 更新 PR は package.json / pnpm-lock.yaml
  # の変更を含むため、`pnpm-lock.yaml` を paths に含めることで捕捉できる。
  # panda.config.ts は preflight / hash 設定の手動変更を検知するために追加。
  # vite.config.ts / postcss.config.* は Panda の生成経路 (Vite / PostCSS との
  # 組み込み点) の手動変更を検知するための予防的登録 (Issue #732)。
  pull_request:
    paths:
      - "panda.config.ts"
      - "package.json"
      - "pnpm-lock.yaml"
      - "vite.config.ts"
      - "postcss.config.*"

# 本 workflow は repo を読むだけで write は不要。明示的に最小権限へ縛る。
# Issue #733: 失敗時に Issue を自動起票するため、`issues: write` を追加する。
# 起票は最終 step (`Open or update issue on failure`) でのみ使用し、それ以前の
# build / test step は read 権限しか触らない。
permissions:
  contents: read
  issues: write

jobs:
  hash-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.8

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build baseline (hash:false) for bundle size comparison
        # Issue #553: baseline (hash:false) との bundle size 対比のため、先に
        # hash:false 状態でビルドして dist/assets/*.{css,js} のサイズを退避する。
        # 本 step は後段の bundle size report 用のデータ収集が目的で、
        # 失敗しても既存の pass/fail 判定 (tests / build with hash:true) には
        # 影響させない (continue-on-error: true)。退避先が空のままでも、
        # 後段の report step が baseline 列を欠落表示するだけで規程通り動作する。
        #
        # Issue #554: 退避対象は CSS だけでなく JS chunk も含める。Panda は JSX
        # 解析で生成した class 文字列を JS bundle 内にも埋め込むため、hash 化に
        # よる class 名長変化は CSS だけでなく JS chunk の gzip 圧縮率にも影響
        # する。退避先ディレクトリは CSS / JS で分離し、後段 report step が
        # 種別ごとに対比表示できるようにする。
        id: baseline_build
        continue-on-error: true
        # 既存 hash:true build step (`Build project with hash:true`) と同じく
        # test を二重実行しないため pnpm exec で panda / vite build を呼ぶ。
        #
        # Issue #528: hash:true build step 側は package.json の `build:ci`
        # を呼ぶ形に統一済みだが (実体は `pnpm run build:ci` を参照)、本 step
        # は意図的に `build:ci` を使わない。理由は直下 (Issue #625 DA #2) の
        # とおり baseline build からは tsc を省きたいため。`build:ci` に
        # 含まれる tsc を流用すると baseline 短縮のメリットが消える。
        # 短縮を維持するため本 step は `pnpm exec panda && pnpm exec vite
        # build` を直接呼ぶ運用を継続する。
        #
        # Issue #625 (DA #2): baseline build からは tsc 系コマンドを意図的に
        # 省略する。本 step の目的は bundle size 計測のみで、型チェックは
        # bundle size と直交する。後段の hash:true build step
        # (`Build project with hash:true`) で同じ tree を tsc にかけるため
        # 型 regression は引き続き検知できる。
        # tsc を省くことで baseline build を 30 秒〜数十秒短縮できる。
        # 注意: baseline (panda + vite build) と hash:true side
        # (`pnpm run build:ci` で実体定義) は実行するコマンド列が非対称になる。
        # bundle size 比較は最終 bundle に tsc が影響しないため妥当だが、
        # 所要時間比較は非対称のため不可 (baseline は tsc を含まないため
        # hash:true より速くなる)。所要時間を将来比較したくなった場合は
        # 両 step を同一コマンド列に揃えるところから設計し直すこと。
        run: |
          set -euo pipefail
          pnpm exec panda
          pnpm exec vite build
          # baseline 成果物を CSS / JS 別ディレクトリに退避。後段で hash:true
          # ビルド成果物と並べて合計サイズで比較する (hash 化でファイル名が
          # 変わるため個別ファイル名比較ではなく合計値で見る)。dist/assets が
          # 無いケース、あるいは片方が 0 件のケースに備えて nullglob で空ガード。
          #
          # Issue #625 (/review M1): self-hosted runner や workflow 再実行で
          # /tmp が永続している環境を想定し、退避先を空に preflight クリーン
          # アップしてから cp する。GitHub-hosted runner は毎回 fresh だが
          # 一貫した挙動にするため明示的に消す (`rm -f /tmp/.../*.css|.js`)。
          # `mktemp -d` に切り替えれば preflight rm 不要だが、後段 report step
          # との path 共有を環境変数で渡す必要があり実装複雑化するため、
          # 固定 path + 明示 rm の方式を選択する。
          mkdir -p /tmp/baseline-css /tmp/baseline-js
          rm -f /tmp/baseline-css/*.css /tmp/baseline-js/*.js
          shopt -s nullglob
          baseline_css_files=(dist/assets/*.css)
          baseline_js_files=(dist/assets/*.js)
          # nullglob は本ブロックの空 glob ガードのためだけに有効化したので
          # ここで解除する。後段 step は独自に shopt -s nullglob を再宣言して
          # おり影響しないが、同一 step 内の以降の処理 (cp / 後続コマンド) に
          # 副作用を残さないよう挿入直後に解除する。
          shopt -u nullglob
          if (( ${#baseline_css_files[@]} > 0 )); then
            cp "${baseline_css_files[@]}" /tmp/baseline-css/
          fi
          if (( ${#baseline_js_files[@]} > 0 )); then
            cp "${baseline_js_files[@]}" /tmp/baseline-js/
          fi

      - name: Annotate baseline build failure
        # Issue #625 (DA #1): baseline build は continue-on-error: true で
        # 失敗を許容しているが、その場合 Actions UI 上では何のエラーも表示
        # されず、後段 report で「baseline 列が n/a に縮退」する原因が
        # 一目で分からない。`::warning::` annotation を出して Run 画面上部
        # に常時可視化することで「baseline 列欠落」と「baseline build 失敗」
        # を Actions UI 上で即座に紐付けられるようにする。
        if: steps.baseline_build.outcome == 'failure'
        run: |
          # メッセージ内ではバックティックではなく単引用符でコード片を引用する
          # (ダブルクォート内の `...` は bash のコマンド置換として解釈される
          # ため)。長文 annotation は変数に分割代入してから 1 行で echo する
          # (annotation 本体に改行を含めると GitHub Actions 上の表示が崩れる)。
          msg="baseline (hash:false) build が失敗したため、"
          msg+="後段の bundle size report で baseline 列は n/a に縮退します。"
          msg+="hash:true 単独の数値は引き続き出力されますが、"
          msg+="'+X.X% (gzip)' 等の対比は得られません。"
          msg+="原因切り分けは baseline_build step のログを参照してください。"
          echo "::warning::${msg}"

      - name: Enable Panda hash:true (temporary in-CI patch)
        # panda.config.ts の defineConfig 内 `preflight: true` 行 (末尾カンマ
        # 任意) 直下に `hash: true,` を 1 行挿入する。リポジトリへは push
        # しない CI 内一時パッチ。挿入後に grep で実在を確認し、未挿入なら
        # 即 fail する。
        #
        # Issue #527: sed / grep のパターンは `preflight: true` の末尾カンマ
        # 有無の両方にマッチするよう `,\?` を付与している。これにより
        # Biome / Prettier 系のフォーマッタが trailing comma を削除する方針に
        # 変わった場合や、誰かが手動でカンマを消した場合でも検出できる。
        # 挿入される行は常に `hash: true,` (カンマあり) で固定する。
        run: |
          set -euo pipefail
          # 末尾カンマの有無両対応で判定する。`hash: true` 単独行のような
          # 部分一致 / 別箇所での hash: true 出現を誤検知しないよう、行頭
          # インデント + key 名 + true + (任意の trailing comma) で限定する。
          #
          # Issue #607: 空白文字クラスは `\s` ではなく `[ \t]` を使う。GNU grep
          # の `\s` は `[[:space:]]` 相当で `\r` も含むため、CR-LF 混入時に
          # 行末の `\r` を吸収してマッチしてしまい、Issue #572 の diagnostic
          # ブロックに到達しない。`[ \t]` に絞ることで CR-LF 混入を確実に
          # fail として捕捉できる。
          if grep -qE '^[ \t]*hash:[ \t]*true,?[ \t]*$' panda.config.ts; then
            echo "panda.config.ts already has hash:true; skip patch."
          else
            # sed expression は単引用符内で組み立てて変数化し、行幅を抑える。
            # 元の式: 's/^\([ \t]*\)preflight: true,\?$/
            #          \1preflight: true,\n\1hash: true,/'
            sed_pattern='^\([ \t]*\)preflight: true,\?$'
            sed_replace='\1preflight: true,\n\1hash: true,'
            sed -i "s/${sed_pattern}/${sed_replace}/" panda.config.ts
          fi
          if ! grep -qE '^[ \t]*hash:[ \t]*true,?[ \t]*$' panda.config.ts; then
            # shellcheck disable=SC2028
            # Ubuntu runner の bash は POSIX 準拠 echo で `\t` を Tab に展開せず
            # リテラルのまま出力する (Issue #607)。正規表現 `[ \t]` を
            # エラーメッセージにそのまま表示したいので printf 化はしない。
            # annotation 本体は変数に分割代入し、1 行で echo する。
            msg="panda.config.ts への hash:true 挿入に失敗しました。"
            msg+="preflight 行の書式が想定 "
            msg+="(^[ \\t]*preflight: true,?[ \\t]*$) と異なる可能性があります。"
            msg+="確認ポイント: "
            msg+="(1) preflight 行の末尾カンマ有無 (sed の置換失敗) / "
            msg+="(2) preflight 行がコメントアウトされていないか / "
            msg+="(3) 別記法 (例: preflight: { enabled: true } 等の "
            msg+="object 表記) に変わっていないか / "
            msg+="(4) 行頭/行末に空白/タブ以外の文字 "
            msg+="(YAML マーカー '-' / CR-LF の CR 混入など) "
            msg+="が紛れていないか。"
            echo "::error::${msg}"
            # Issue #572: 失敗時に panda.config.ts の preflight 周辺行 (L15-30)
            # を dump し、上記 (1)-(4) のどれが原因かを実機の現物で切り分け
            # 可能にする。正常系では本ブロックには到達しない (exit 1 で job
            # が止まる) ため、後段の "patched head" dump との二重出力には
            # ならない。cat -A を使い、行末の CR (`^M`) や trailing space ($)
            # を可視化して (4) の検出を補助する。
            echo "--- panda.config.ts (preflight 周辺, L15-30) ---" >&2
            sed -n '15,30p' panda.config.ts | cat -A >&2
            echo "--- end of dump ---" >&2
            exit 1
          fi
          echo "--- panda.config.ts (patched head) ---"
          sed -n '20,35p' panda.config.ts

      - name: Regenerate Panda CSS with hash:true
        run: pnpm prepare

      - name: Run tests with hash:true
        id: tests
        # continue-on-error を付与しないと test 失敗時に job が abort され、
        # 後続の Report ステップ (アノテーション出力) に到達しない。
        continue-on-error: true
        run: pnpm test:run

      - name: Report test regression
        # outcome は continue-on-error 適用前のステップ結果。conclusion は
        # continue-on-error 適用後 (success 扱い) になるため outcome を使う。
        if: steps.tests.outcome == 'failure'
        run: |
          # annotation 本体は変数に分割代入してから 1 行で echo する。
          # ダブルクォート内のバッククォートは bash のコマンド置換として解釈
          # されるため、コード片の引用は単引用符に置き換える (L165 と同じ
          # 方針)。
          msg="Tripwire テストの hash 耐性に regression があります。"
          msg+="data-* 属性が hash 化に追従していない可能性があります。"
          msg+="詳細は Issue #496 / Issue #475 / "
          msg+="CLAUDE.md の 'Panda hash:true の運用判断' を参照してください。"
          echo "::error::${msg}"
          exit 1

      - name: Build project with hash:true
        id: build
        # test が失敗した場合は build を走らせない。test 通過時のみ build を
        # 走らせて build regression を切り分ける。
        if: steps.tests.outcome == 'success'
        continue-on-error: true
        # pnpm build は内部で lint / test:run / type-check 系を経た上で
        # panda + tsc + (tsc --project tsconfig.api.json) + vite build を呼ぶため、
        # 上の test step と二重実行になる。さらに build 内 test 失敗が
        # build regression として通知されると原因切り分けが崩れるため、
        # ここでは test / lint を含まない専用 script `build:ci` を呼ぶ
        # (実体は package.json の `build:ci` を参照。本番 `build` 経路の
        # panda / tsc / vite build と同等のコマンド列に追従させている)。
        # Issue #528: 以前は `pnpm exec panda && pnpm exec tsc && pnpm exec vite
        # build` を直接書いていたが、本番 `build` script とのコマンド列 drift
        # を防ぐため package.json 側に `build:ci` を切り出して呼ぶ形に変更
        # した。`build:ci` は本番 build 経路と等価な軽量版で、test / lint /
        # type-check:scripts は意図的に含めない。
        # Issue #667: src/api/ を本体 tsc から分離した際、`build:ci` に
        # `tsc --project tsconfig.api.json` step が追加された。本番 `build`
        # も同じ tsc 列を踏むため drift は無く、本 step は `pnpm run build:ci`
        # を呼ぶだけで自動追従する。コマンド列の正確な定義は package.json の
        # `build:ci` を一次情報源として参照すること。
        run: pnpm run build:ci

      - name: Report build regression
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'failure'
        run: |
          msg="hash:true でビルドが失敗しました。"
          msg+="Panda 生成物または hook class との整合に regression が"
          msg+="あります。hash 化された class 名と手書き hook class "
          msg+="(index-row-*/copy-btn 等) の衝突可能性も確認してください。"
          echo "::error::${msg}"
          exit 1

      - name: Report bundle size (raw / gzip, baseline vs hash:true)
        # CLAUDE.md L75 の「gzip 後 +5.8%」トレードオフを CI 上で追跡可能に
        # する。本 step は GITHUB_STEP_SUMMARY に Markdown 表として書き出す
        # のみで、pass/fail 判定には影響しない。閾値での自動 fail は導入せず、
        # 数値の経時変化は手動 (workflow_dispatch) 実行時に Actions UI 上の
        # Summary から目視で確認する運用とする。
        # build が成功した時のみ実行する。test / build いずれかが失敗した
        # 場合は dist/assets が信頼できないため report をスキップする。
        #
        # Issue #553: baseline (hash:false) で先にビルドした CSS が
        # /tmp/baseline-css/ に退避されているので、合計サイズで対比して
        # `+X.X% (gzip) / -Y.Y% (raw)` の差分を表に追加する。hash 化でファイル
        # 名が変わるため、個別ファイル単位ではなく合計バイト数で比較する。
        # baseline build が失敗した場合は baseline 列を欠落させ、hash:true
        # 単独の表示に縮退する。
        #
        # Issue #625 (/review M2): 縮退判定は `steps.baseline_build.outcome`
        # を直接見るのではなく、`/tmp/baseline-{css,js}/` に退避ファイルが
        # 存在するか (= `base_*_raw > 0` か) で間接的に判定する。後者の方が
        # 「成果物が実際に得られたか」を直接表現でき、baseline build が
        # success でも空 artifact を残したケース (例: vite が assets を emit
        # しなかった) も縮退に倒せる。outcome 直判定は別途
        # `Annotate baseline build failure` step で `::warning::` 出力に
        # 使用している。
        #
        # Issue #554: 対象を CSS だけでなく JS chunk (dist/assets/*.js) にも
        # 拡張する。Panda は JSX 解析で生成した class 文字列を JS bundle 内
        # にも埋め込むため、hash 化による class 名長変化は CSS だけでなく JS
        # chunk の gzip 圧縮率にも影響する (gzip 後の +5.8% トレードオフが
        # JS 側でも同様に観測できるか追跡可能にする)。レポート構成は
        # CSS / JS で 2 テーブルに分け、baseline 対比は CSS / JS / total の
        # 3 行で表示する。JS chunk は記事数だけ並ぶことがあるため per-file
        # 明細は <details> でラップして折りたたむ。
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        run: |
          set -euo pipefail
          # 空 glob ガード: `set -euo pipefail` 下で
          # `for f in dist/assets/*.{css,js}` を直接書くと、対象が 1 件も
          # emit されないケースで glob がリテラル文字列のまま 1 回ループし、
          # `stat` が非 0 で終了して job 自体が fail する。これは「pass/fail
          # 判定に影響しない」という本 step の前提に反するため、nullglob で
          # 空配列に展開してスキップする。
          #
          # Issue #625 (/review M3): nullglob は **直後の 4 件の配列展開
          # (css_files / js_files / baseline_css_files / baseline_js_files)
          # のためだけに有効化する**。展開が終わったらすぐ `shopt -u nullglob`
          # で解除し、本 step 内の以降の glob (sum_sizes 関数内では glob を
          # 使わず "$@" だけを参照、per-file 明細ループも展開済み配列を
          # 使う) に副作用が及ばないようにする。これにより「nullglob は
          # 一時的な配列展開のスコープに閉じる」という意図がコード上で
          # 明確になる。
          shopt -s nullglob
          css_files=(dist/assets/*.css)
          js_files=(dist/assets/*.js)
          baseline_css_files=(/tmp/baseline-css/*.css)
          baseline_js_files=(/tmp/baseline-js/*.js)
          # 4 件の配列展開が完了したのでここで nullglob を解除する。
          shopt -u nullglob
          if (( ${#css_files[@]} == 0 && ${#js_files[@]} == 0 )); then
            {
              echo "## hash:true CSS / JS bundle size";
              echo "";
              echo "_(no CSS / JS assets emitted under dist/assets/)_";
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 合計サイズを算出するヘルパー。`sum_sizes <files...>` で raw/gz
          # 合計を空白区切りで 1 行に出力する (`raw_total gz_total`)。空配列
          # の場合は `0 0` を返す。
          #
          # Issue #625 (DA #3): `gzip -c` は GNU gzip の default level=6 で
          # 圧縮する。本番配信実態 (nginx default `gzip_comp_level 1`、CDN
          # / Cloudflare Brotli 等) とは差異があるため、本数値は「ある一定
          # の圧縮レベルでの相対比較」として読むこと。レベル 1 と 6 の差は
          # 数% オーダーで baseline vs hash:true の相対差 (CLAUDE.md L75:
          # gzip 後 +5.8%) には大きく影響しないが、絶対値そのものは本番転送
          # 量とは一致しない。本番に合わせたい場合は `gzip -1 -c` などに
          # 変更する余地はあるが、現状は GNU gzip の default を採用する
          # (再現性が高く、開発者ローカルで `gzip -c | wc -c` した値と一致
          # するため)。
          sum_sizes() {
            local raw_total=0
            local gz_total=0
            local f raw gz
            for f in "$@"; do
              raw=$(stat -c '%s' "$f")
              gz=$(gzip -c "$f" | wc -c)
              raw_total=$(( raw_total + raw ))
              gz_total=$(( gz_total + gz ))
            done
            echo "${raw_total} ${gz_total}"
          }

          # baseline / hash:true 双方の CSS / JS 合計を集計する。read で
          # 空白区切りを 2 変数に同時展開し、awk への引き渡しを統一する。
          read -r hash_css_raw hash_css_gz < <(sum_sizes "${css_files[@]}")
          read -r hash_js_raw hash_js_gz < <(sum_sizes "${js_files[@]}")
          read -r base_css_raw base_css_gz \
            < <(sum_sizes "${baseline_css_files[@]}")
          read -r base_js_raw base_js_gz \
            < <(sum_sizes "${baseline_js_files[@]}")
          hash_total_raw=$(( hash_css_raw + hash_js_raw ))
          hash_total_gz=$(( hash_css_gz + hash_js_gz ))
          base_total_raw=$(( base_css_raw + base_js_raw ))
          base_total_gz=$(( base_css_gz + base_js_gz ))

          # 差分 % 算出ヘルパー (baseline が 0 のとき n/a)。awk で小数1桁の
          # % を出す (bash は整数演算のみのため)。
          diff_pct() {
            local base=$1
            local hash=$2
            if (( base > 0 )); then
              awk -v b="$base" -v h="$hash" \
                'BEGIN { printf "%+.1f%%", (h - b) * 100.0 / b }'
            else
              echo "n/a"
            fi
          }

          # 個別ファイル明細 (hash:true 側)。JS chunk は記事数だけ並ぶため
          # <details> でラップして折りたたむ。CSS は通常 1 件なので開いた
          # ままで良い (個別 <details> ラップで揃え見通しを上げる)。
          {
            echo "## hash:true CSS / JS bundle size";
            echo "";
            echo "<details open><summary>Per-file CSS (hash:true)</summary>";
            echo "";
            if (( ${#css_files[@]} == 0 )); then
              echo "_(no CSS assets emitted)_";
            else
              echo "| File | raw (B) | gzip (B) |";
              echo "|------|--------:|---------:|";
              for f in "${css_files[@]}"; do
                raw=$(stat -c '%s' "$f")
                gz=$(gzip -c "$f" | wc -c)
                echo "| \`$(basename "$f")\` | ${raw} | ${gz} |";
              done
            fi
            echo "";
            echo "</details>";
            echo "";
            echo "<details><summary>Per-file JS (hash:true)</summary>";
            echo "";
            if (( ${#js_files[@]} == 0 )); then
              echo "_(no JS assets emitted)_";
            else
              echo "| File | raw (B) | gzip (B) |";
              echo "|------|--------:|---------:|";
              # 視認性のため raw サイズ降順で並べる。`sort -k` を使うため
              # 一旦 raw / gz / path を tab 区切りで出してから整形する。
              # runs-on: ubuntu-latest 前提で GNU sort/coreutils 機能
              # (`-k1,1nr`) を使う。
              for f in "${js_files[@]}"; do
                raw=$(stat -c '%s' "$f")
                gz=$(gzip -c "$f" | wc -c)
                printf '%s\t%s\t%s\n' "$raw" "$gz" "$f"
              done | sort -k1,1nr | while IFS=$'\t' read -r raw gz f; do
                echo "| \`$(basename "$f")\` | ${raw} | ${gz} |";
              done
            fi
            echo "";
            echo "</details>";
          } >> "$GITHUB_STEP_SUMMARY"

          # Issue #625 (DA #4): baseline (hash:false) 側にも per-file 明細を
          # <details> でラップして出す。hash:true 側 (上) と並べることで、
          # 「どのファイルが baseline と比べて raw / gzip でどう変動したか」
          # を file 名を手がかりに紐付けやすくする。hash 化でファイル名が
          # 変わるため file 単位の 1:1 突合は不可能だが、JS chunk の主要
          # チャンク (大きい順) を見比べる用途には十分使える。baseline build
          # が失敗 / 空 emit の場合は明細を空メッセージに縮退する。CSS は
          # hash:true 側と揃えて open、JS は閉じた状態で出す。
          # <details> サマリ行は yamllint line-length に収めるため変数化する。
          baseline_css_summary='<summary>Per-file CSS (baseline, hash:false)'
          baseline_css_summary+='</summary>'
          baseline_js_summary='<summary>Per-file JS (baseline, hash:false)'
          baseline_js_summary+='</summary>'
          {
            echo "";
            echo "<details open>${baseline_css_summary}";
            echo "";
            if (( ${#baseline_css_files[@]} == 0 )); then
              echo "_(no baseline CSS assets; baseline build may have failed)_";
            else
              echo "| File | raw (B) | gzip (B) |";
              echo "|------|--------:|---------:|";
              for f in "${baseline_css_files[@]}"; do
                raw=$(stat -c '%s' "$f")
                gz=$(gzip -c "$f" | wc -c)
                echo "| \`$(basename "$f")\` | ${raw} | ${gz} |";
              done
            fi
            echo "";
            echo "</details>";
            echo "";
            echo "<details>${baseline_js_summary}";
            echo "";
            if (( ${#baseline_js_files[@]} == 0 )); then
              echo "_(no baseline JS assets; baseline build may have failed)_";
            else
              echo "| File | raw (B) | gzip (B) |";
              echo "|------|--------:|---------:|";
              # hash:true 側と同じく raw 降順で並べて主要 chunk を上に出す。
              # runs-on: ubuntu-latest 前提で GNU sort/coreutils 機能
              # (`-k1,1nr`) を使う。
              for f in "${baseline_js_files[@]}"; do
                raw=$(stat -c '%s' "$f")
                gz=$(gzip -c "$f" | wc -c)
                printf '%s\t%s\t%s\n' "$raw" "$gz" "$f"
              done | sort -k1,1nr | while IFS=$'\t' read -r raw gz f; do
                echo "| \`$(basename "$f")\` | ${raw} | ${gz} |";
              done
            fi
            echo "";
            echo "</details>";
          } >> "$GITHUB_STEP_SUMMARY"

          # baseline 対比サマリ (CSS / JS / total の 3 行)。baseline が
          # 取得できなかった種別は差分列を `n/a` に縮退する。
          css_raw_diff=$(diff_pct "$base_css_raw" "$hash_css_raw")
          css_gz_diff=$(diff_pct "$base_css_gz" "$hash_css_gz")
          js_raw_diff=$(diff_pct "$base_js_raw" "$hash_js_raw")
          js_gz_diff=$(diff_pct "$base_js_gz" "$hash_js_gz")
          total_raw_diff=$(diff_pct "$base_total_raw" "$hash_total_raw")
          total_gz_diff=$(diff_pct "$base_total_gz" "$hash_total_gz")
          base_css_raw_cell="$base_css_raw"
          base_css_gz_cell="$base_css_gz"
          base_js_raw_cell="$base_js_raw"
          base_js_gz_cell="$base_js_gz"
          base_total_raw_cell="$base_total_raw"
          base_total_gz_cell="$base_total_gz"
          # M2 コメントに沿って「成果物が実際に得られたか」を配列要素数で
          # 直接判定する。`base_*_raw == 0` だと「0 バイト CSS 1 件」のような
          # 理論上のエッジで誤って縮退してしまうのを避ける。
          if (( ${#baseline_css_files[@]} == 0 )); then
            base_css_raw_cell="n/a"
            base_css_gz_cell="n/a"
          fi
          if (( ${#baseline_js_files[@]} == 0 )); then
            base_js_raw_cell="n/a"
            base_js_gz_cell="n/a"
          fi
          # total baseline は両 kind が揃ったときだけ有効値とする。片方でも
          # 欠落していると hash:true (両 kind 集計) との比較が不公平になる
          # ため、安全側に倒して n/a に縮退する。
          total_baseline_valid=1
          base_css_count=${#baseline_css_files[@]}
          base_js_count=${#baseline_js_files[@]}
          if (( base_css_count == 0 || base_js_count == 0 )); then
            total_baseline_valid=0
          fi
          if (( total_baseline_valid == 0 )); then
            base_total_raw_cell="n/a"
            base_total_gz_cell="n/a"
            total_raw_diff="n/a"
            total_gz_diff="n/a"
          fi
          # baseline 対比表は行幅を抑えるため printf '%s\t...' で組み立てて
          # から `| column -t -s $'\t' -o ' | '` で整形…はしない (列幅可変で
          # markdown 表として崩れるリスクがあるため)。代わりに per-cell
          # 変数を短縮名に再代入して echo 1 行を 80 列以内に収める。
          br="$base_css_raw_cell"
          bg="$base_css_gz_cell"
          hr="$hash_css_raw"
          hg="$hash_css_gz"
          dr="$css_raw_diff"
          dg="$css_gz_diff"
          {
            echo "";
            echo "### Baseline (hash:false) vs hash:true (total)";
            echo "";
            echo "| Kind | Metric | baseline (hash:false) | hash:true | diff |";
            echo "|------|--------|----------------------:|----------:|-----:|";
            echo "| CSS  | raw  (B)  | ${br} | ${hr} | ${dr} |";
            echo "| CSS  | gzip (B) | ${bg} | ${hg} | ${dg} |";
          } >> "$GITHUB_STEP_SUMMARY"
          br="$base_js_raw_cell"
          bg="$base_js_gz_cell"
          hr="$hash_js_raw"
          hg="$hash_js_gz"
          dr="$js_raw_diff"
          dg="$js_gz_diff"
          {
            echo "| JS   | raw  (B)  | ${br} | ${hr} | ${dr} |";
            echo "| JS   | gzip (B) | ${bg} | ${hg} | ${dg} |";
          } >> "$GITHUB_STEP_SUMMARY"
          br="$base_total_raw_cell"
          bg="$base_total_gz_cell"
          hr="$hash_total_raw"
          hg="$hash_total_gz"
          dr="$total_raw_diff"
          dg="$total_gz_diff"
          {
            echo "| total | raw  (B)  | ${br} | ${hr} | ${dr} |";
            echo "| total | gzip (B) | ${bg} | ${hg} | ${dg} |";
            if (( base_css_count == 0 && base_js_count == 0 )); then
              echo "";
              echo "_(baseline build produced no assets; baseline = n/a)_";
            elif (( base_css_count == 0 || base_js_count == 0 )); then
              echo "";
              echo "_(baseline produced only one kind; missing = n/a)_";
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Open or update issue on failure
        # Issue #733: 失敗時に能動的な通知経路として Issue を自動起票する。
        # 検討選択肢 (a) Slack 通知 / (b) メール通知 / (c) Issue 自動起票 /
        # (d) 現状維持 のうち、(c) Issue 自動起票 を採用する。判断根拠:
        #   - (a) Slack: webhook secret の管理コストが増える (workspace /
        #     webhook URL を新規導入する必要があり、外部依存追加最小化の
        #     方針 (memory feedback_no_new_libraries) と整合しない)
        #   - (b) メール: GitHub Actions の標準通知 (commit author email へ
        #     workflow 失敗時に自動送付) で既に同等のメール経路は確保済み。
        #     workflow 側で追加実装する意味が薄い (= 実質 (d) と等価)
        #   - (c) Issue: リポジトリ内で履歴管理でき、`gh` CLI を使えば外部
        #     依存追加なしで実装可能。dedup は「title 一意性 + open issue
        #     検索」で十分担保できる
        #
        # 起票内容には workflow run URL / event 名 / 失敗 step の特定情報を
        # 含める。dedup 戦略は以下:
        #   1. `gh issue list --search` で同名タイトルの open issue を検索
        #   2. ヒットしなければ `gh issue create` で新規起票
        #   3. ヒットすれば最古の open issue (= 元起票) にコメント追記
        #
        # job 全体の失敗 (test 失敗 / build 失敗 / sed 失敗 / setup 失敗 等)
        # を網羅するため `if: failure()` で発火させる。job が成功 (= test /
        # build 共に pass) の場合はスキップする。
        #
        # 重複検索の race condition について:
        #   - cron (月 1) と PR trigger は並走可能だが、同名タイトル検索 +
        #     `gh issue create` は GitHub API の即時整合性により多くの場合
        #     1 起票に収束する。万一 2 起票になった場合は手動で片方を close
        #     する運用とし、自動 close 機構は導入しない (実装複雑化に対する
        #     メリットが小さい)
        if: failure()
        env:
          # GitHub CLI 認証用。`permissions: issues: write` と組み合わせて
          # GITHUB_TOKEN で issue 操作を行う。
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: >-
            ${{ github.server_url }}/${{ github.repository
            }}/actions/runs/${{ github.run_id }}
          EVENT_NAME: ${{ github.event_name }}
          RUN_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # 起票時刻は ISO 8601 (UTC) で残す。GitHub Actions runner はデフォ
          # ルト UTC なので date -u で揃える。
          run_time=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          # title は dedup のキーになるため、固定文字列で揃える。run id 等の
          # 可変情報を入れると別 issue 扱いになり dedup が効かなくなる。
          issue_title="panda-hash-regression workflow が失敗しました"
          # body はコメント / 新規起票で共通利用する。heredoc は本文を
          # `printf` で組み立てる方式に揃える: shell script の indent と
          # heredoc 本文の indent を独立させたい一方、`<<-EOF` だと leading
          # tab しか剥がせず markdown 内の半角スペース indent が崩れる。
          # printf + 個別 echo の方が markdown 制御を維持しやすい。
          body_file=$(mktemp)
          {
            echo "## panda-hash-regression workflow 失敗の通知"
            echo ""
            echo "\`.github/workflows/panda-hash-regression.yml\` が失敗しました。"
            echo ""
            echo "- **Run URL**: ${RUN_URL}"
            echo "- **Event**: \`${EVENT_NAME}\`"
            echo "- **Commit SHA**: \`${RUN_SHA}\`"
            echo "- **Run time (UTC)**: ${run_time}"
            echo ""
            echo "## 確認手順"
            echo ""
            echo "1. Run URL を開き、失敗 step のログを確認する"
            echo "   - \`Enable Panda hash:true\` 失敗: \`panda.config.ts\` の"
            echo "     preflight 行書式が drift している可能性"
            echo "   - \`Run tests with hash:true\` 失敗: Tripwire テストの"
            echo "     hash 耐性に regression がある (\`data-*\` 属性が hash 化"
            echo "     に追従できていない)"
            echo "   - \`Build project with hash:true\` 失敗: Panda 生成物または"
            echo "     hook class との整合に regression がある"
            echo "2. 詳細は Issue #496 / Issue #475 / CLAUDE.md の"
            echo "   \"Panda hash:true の運用判断\" を参照する"
            echo "3. 修正 PR を出すか、原因 issue を別途切る"
            echo ""
            echo "## 自動起票について"
            echo ""
            echo "- 本 Issue は \`panda-hash-regression\` workflow 失敗時に"
            echo "  自動起票されたものです (Issue #733 の実装)。"
            echo "- 同名タイトルの open issue が既に存在する場合はコメントが"
            echo "  追記され、新規起票はされません。"
            echo "- 解決後はこの Issue を手動で close してください。次回失敗時に"
            echo "  また自動起票されます。"
          } > "${body_file}"

          # 既存 open issue を検索。`--search` は GitHub の検索構文を使う
          # ため、タイトル完全一致は `in:title` + ダブルクォートで囲む。
          # `--json number,title` で取得し、jq でタイトル完全一致のみを
          # フィルタする (検索構文は部分一致もヒットさせるため、二重フィル
          # ターで dedup を担保する)。
          existing_number=$(
            gh issue list \
              --state open \
              --search "in:title \"${issue_title}\"" \
              --json number,title \
              --jq ".[] | select(.title == \"${issue_title}\") | .number" \
              | head -n 1
          )

          if [ -n "${existing_number}" ]; then
            echo "既存 open issue #${existing_number} にコメントを追記します"
            gh issue comment "${existing_number}" --body-file "${body_file}"
          else
            echo "既存 open issue が見つからないため新規起票します"
            gh issue create \
              --title "${issue_title}" \
              --body-file "${body_file}" \
              --label "ci,chore"
          fi
