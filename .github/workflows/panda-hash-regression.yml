name: Panda hash:true regression check

# Issue #496 / Issue #475 の検証で、Tripwire テスト 647 件は `hash: true`
# 有効化でも全 pass することが確認済み。ただし bundle size のメリットは
# 小さい (gzip 後 +5.8%) ため本番は `hash: false` (デフォルト) で運用し、
# regression 検知のため手動 (workflow_dispatch) でのみ実行する。
#
# このworkflowは既存 CI に影響を与えないよう push / pull_request トリガーは
# 持たず、workflow_dispatch のみで起動する。panda.config.ts の書き換えは
# CI の working tree 上のみで行い、リポジトリには commit / push しない。

on:
  workflow_dispatch:

# 本 workflow は repo を読むだけで write は不要。明示的に最小権限へ縛る。
permissions:
  contents: read

jobs:
  hash-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build baseline (hash:false) for bundle size comparison
        # Issue #553: baseline (hash:false) との bundle size 対比のため、先に
        # hash:false 状態でビルドして dist/assets/*.{css,js} のサイズを退避する。
        # 本 step は後段の bundle size report 用のデータ収集が目的で、
        # 失敗しても既存の pass/fail 判定 (tests / build with hash:true) には
        # 影響させない (continue-on-error: true)。退避先が空のままでも、
        # 後段の report step が baseline 列を欠落表示するだけで規程通り動作する。
        #
        # Issue #554: 退避対象は CSS だけでなく JS chunk も含める。Panda は JSX
        # 解析で生成した class 文字列を JS bundle 内にも埋め込むため、hash 化に
        # よる class 名長変化は CSS だけでなく JS chunk の gzip 圧縮率にも影響
        # する。退避先ディレクトリは CSS / JS で分離し、後段 report step が
        # 種別ごとに対比表示できるようにする。
        id: baseline_build
        continue-on-error: true
        # 既存 hash:true build step (L116) と同じく test を二重実行しないため
        # pnpm exec で panda / tsc / vite build を 1 回ずつ呼ぶ。Issue #528 で
        # 議論中の package.json build スクリプトとの drift 問題は本 issue の
        # スコープ外。両 step で同じコマンド列を使うことで本 workflow 内では
        # 一貫性を保つ。
        run: |
          set -euo pipefail
          pnpm exec panda
          pnpm exec tsc
          pnpm exec vite build
          # baseline 成果物を CSS / JS 別ディレクトリに退避。後段で hash:true
          # ビルド成果物と並べて合計サイズで比較する (hash 化でファイル名が
          # 変わるため個別ファイル名比較ではなく合計値で見る)。dist/assets が
          # 無いケース、あるいは片方が 0 件のケースに備えて nullglob で空ガード。
          mkdir -p /tmp/baseline-css /tmp/baseline-js
          shopt -s nullglob
          baseline_css_files=(dist/assets/*.css)
          baseline_js_files=(dist/assets/*.js)
          shopt -u nullglob
          if (( ${#baseline_css_files[@]} > 0 )); then
            cp "${baseline_css_files[@]}" /tmp/baseline-css/
          fi
          if (( ${#baseline_js_files[@]} > 0 )); then
            cp "${baseline_js_files[@]}" /tmp/baseline-js/
          fi

      - name: Enable Panda hash:true (temporary in-CI patch)
        # panda.config.ts の defineConfig 内 `preflight: true` 行 (末尾カンマ
        # 任意) 直下に `hash: true,` を 1 行挿入する。リポジトリへは push
        # しない CI 内一時パッチ。挿入後に grep で実在を確認し、未挿入なら
        # 即 fail する。
        #
        # Issue #527: sed / grep のパターンは `preflight: true` の末尾カンマ
        # 有無の両方にマッチするよう `,\?` を付与している。これにより
        # Biome / Prettier 系のフォーマッタが trailing comma を削除する方針に
        # 変わった場合や、誰かが手動でカンマを消した場合でも検出できる。
        # 挿入される行は常に `hash: true,` (カンマあり) で固定する。
        run: |
          set -euo pipefail
          # 末尾カンマの有無両対応で判定する。`hash: true` 単独行のような
          # 部分一致 / 別箇所での hash: true 出現を誤検知しないよう、行頭
          # インデント + key 名 + true + (任意の trailing comma) で限定する。
          #
          # Issue #607: 空白文字クラスは `\s` ではなく `[ \t]` を使う。GNU grep
          # の `\s` は `[[:space:]]` 相当で `\r` も含むため、CR-LF 混入時に
          # 行末の `\r` を吸収してマッチしてしまい、Issue #572 の diagnostic
          # ブロックに到達しない。`[ \t]` に絞ることで CR-LF 混入を確実に
          # fail として捕捉できる。
          if grep -qE '^[ \t]*hash:[ \t]*true,?[ \t]*$' panda.config.ts; then
            echo "panda.config.ts already has hash:true; skip patch."
          else
            sed -i 's/^\([ \t]*\)preflight: true,\?$/\1preflight: true,\n\1hash: true,/' panda.config.ts
          fi
          if ! grep -qE '^[ \t]*hash:[ \t]*true,?[ \t]*$' panda.config.ts; then
            # shellcheck disable=SC2028
            # Ubuntu runner の bash は POSIX 準拠 echo で `\t` を Tab に展開せず
            # リテラルのまま出力する (Issue #607)。正規表現 `[ \t]` を
            # エラーメッセージにそのまま表示したいので printf 化はしない。
            echo "::error::panda.config.ts への hash:true 挿入に失敗しました。preflight 行の書式が想定 (^[ \\t]*preflight: true,?[ \\t]*$) と異なる可能性があります。確認ポイント: (1) preflight 行の末尾カンマ有無 (sed の置換失敗) / (2) preflight 行がコメントアウトされていないか / (3) 別記法 (例: preflight: { enabled: true } 等の object 表記) に変わっていないか / (4) 行頭/行末に空白/タブ以外の文字 (YAML マーカー '-' / CR-LF の CR 混入など) が紛れていないか。"
            # Issue #572: 失敗時に panda.config.ts の preflight 周辺行 (L15-30)
            # を dump し、上記 (1)-(4) のどれが原因かを実機の現物で切り分け
            # 可能にする。正常系では本ブロックには到達しない (exit 1 で job
            # が止まる) ため、後段の "patched head" dump との二重出力には
            # ならない。cat -A を使い、行末の CR (`^M`) や trailing space ($)
            # を可視化して (4) の検出を補助する。
            echo "--- panda.config.ts (preflight 周辺, L15-30) ---" >&2
            sed -n '15,30p' panda.config.ts | cat -A >&2
            echo "--- end of dump ---" >&2
            exit 1
          fi
          echo "--- panda.config.ts (patched head) ---"
          sed -n '20,35p' panda.config.ts

      - name: Regenerate Panda CSS with hash:true
        run: pnpm prepare

      - name: Run tests with hash:true
        id: tests
        # continue-on-error を付与しないと test 失敗時に job が abort され、
        # 後続の Report ステップ (アノテーション出力) に到達しない。
        continue-on-error: true
        run: pnpm test:run

      - name: Report test regression
        # outcome は continue-on-error 適用前のステップ結果。conclusion は
        # continue-on-error 適用後 (success 扱い) になるため outcome を使う。
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::Tripwire テストの hash 耐性に regression があります。data-* 属性が hash 化に追従していない可能性があります。詳細は Issue #496 / Issue #475 / CLAUDE.md の `Panda hash:true の運用判断` を参照してください。"
          exit 1

      - name: Build project with hash:true
        id: build
        # test が失敗した場合は build を走らせない。test 通過時のみ build を
        # 走らせて build regression を切り分ける。
        if: steps.tests.outcome == 'success'
        continue-on-error: true
        # pnpm build は内部で `pnpm run lint && pnpm run test:run && pnpm run
        # type-check && panda && tsc && vite build` を呼ぶため、上の test step
        # と二重実行になる。さらに build 内 test 失敗が build regression として
        # 通知されると原因切り分けが崩れるため、ここでは pnpm exec で生成 /
        # 型チェック / バンドルだけを 1 回ずつ実行する。
        run: pnpm exec panda && pnpm exec tsc && pnpm exec vite build

      - name: Report build regression
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'failure'
        run: |
          echo "::error::hash:true でビルドが失敗しました。Panda 生成物または hook class との整合に regression があります。hash 化された class 名と手書き hook class (index-row-*/copy-btn 等) の衝突可能性も確認してください。"
          exit 1

      - name: Report bundle size (raw / gzip, baseline vs hash:true)
        # CLAUDE.md L75 の「gzip 後 +5.8%」トレードオフを CI 上で追跡可能に
        # する。本 step は GITHUB_STEP_SUMMARY に Markdown 表として書き出す
        # のみで、pass/fail 判定には影響しない。閾値での自動 fail は導入せず、
        # 数値の経時変化は手動 (workflow_dispatch) 実行時に Actions UI 上の
        # Summary から目視で確認する運用とする。
        # build が成功した時のみ実行する。test / build いずれかが失敗した
        # 場合は dist/assets が信頼できないため report をスキップする。
        #
        # Issue #553: baseline (hash:false) で先にビルドした CSS が
        # /tmp/baseline-css/ に退避されているので、合計サイズで対比して
        # `+X.X% (gzip) / -Y.Y% (raw)` の差分を表に追加する。hash 化でファイル
        # 名が変わるため、個別ファイル単位ではなく合計バイト数で比較する。
        # baseline build が失敗 (steps.baseline_build.outcome == 'failure') した
        # 場合は baseline 列を欠落させ、hash:true 単独の表示に縮退する。
        #
        # Issue #554: 対象を CSS だけでなく JS chunk (dist/assets/*.js) にも
        # 拡張する。Panda は JSX 解析で生成した class 文字列を JS bundle 内
        # にも埋め込むため、hash 化による class 名長変化は CSS だけでなく JS
        # chunk の gzip 圧縮率にも影響する (gzip 後の +5.8% トレードオフが
        # JS 側でも同様に観測できるか追跡可能にする)。レポート構成は
        # CSS / JS で 2 テーブルに分け、baseline 対比は CSS / JS / total の
        # 3 行で表示する。JS chunk は記事数だけ並ぶことがあるため per-file
        # 明細は <details> でラップして折りたたむ。
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        run: |
          set -euo pipefail
          # 空 glob ガード: `set -euo pipefail` 下で
          # `for f in dist/assets/*.{css,js}` を直接書くと、対象が 1 件も
          # emit されないケースで glob がリテラル文字列のまま 1 回ループし、
          # `stat` が非 0 で終了して job 自体が fail する。これは「pass/fail
          # 判定に影響しない」という本 step の前提に反するため、nullglob で
          # 空配列に展開してスキップする。
          shopt -s nullglob
          css_files=(dist/assets/*.css)
          js_files=(dist/assets/*.js)
          baseline_css_files=(/tmp/baseline-css/*.css)
          baseline_js_files=(/tmp/baseline-js/*.js)
          shopt -u nullglob
          if (( ${#css_files[@]} == 0 && ${#js_files[@]} == 0 )); then
            {
              echo "## hash:true CSS / JS bundle size";
              echo "";
              echo "_(no CSS / JS assets emitted under dist/assets/)_";
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          # 合計サイズを算出するヘルパー。`sum_sizes <files...>` で raw/gz
          # 合計を空白区切りで 1 行に出力する (`raw_total gz_total`)。空配列
          # の場合は `0 0` を返す。
          sum_sizes() {
            local raw_total=0
            local gz_total=0
            local f raw gz
            for f in "$@"; do
              raw=$(stat -c '%s' "$f")
              gz=$(gzip -c "$f" | wc -c)
              raw_total=$(( raw_total + raw ))
              gz_total=$(( gz_total + gz ))
            done
            echo "${raw_total} ${gz_total}"
          }

          # baseline / hash:true 双方の CSS / JS 合計を集計する。read で
          # 空白区切りを 2 変数に同時展開し、awk への引き渡しを統一する。
          read -r hash_css_raw hash_css_gz < <(sum_sizes "${css_files[@]}")
          read -r hash_js_raw hash_js_gz < <(sum_sizes "${js_files[@]}")
          read -r base_css_raw base_css_gz \
            < <(sum_sizes "${baseline_css_files[@]}")
          read -r base_js_raw base_js_gz \
            < <(sum_sizes "${baseline_js_files[@]}")
          hash_total_raw=$(( hash_css_raw + hash_js_raw ))
          hash_total_gz=$(( hash_css_gz + hash_js_gz ))
          base_total_raw=$(( base_css_raw + base_js_raw ))
          base_total_gz=$(( base_css_gz + base_js_gz ))

          # 差分 % 算出ヘルパー (baseline が 0 のとき n/a)。awk で小数1桁の
          # % を出す (bash は整数演算のみのため)。
          diff_pct() {
            local base=$1
            local hash=$2
            if (( base > 0 )); then
              awk -v b="$base" -v h="$hash" \
                'BEGIN { printf "%+.1f%%", (h - b) * 100.0 / b }'
            else
              echo "n/a"
            fi
          }

          # 個別ファイル明細 (hash:true 側)。JS chunk は記事数だけ並ぶため
          # <details> でラップして折りたたむ。CSS は通常 1 件なので開いた
          # ままで良い (個別 <details> ラップで揃え見通しを上げる)。
          {
            echo "## hash:true CSS / JS bundle size";
            echo "";
            echo "<details open><summary>Per-file CSS (hash:true)</summary>";
            echo "";
            if (( ${#css_files[@]} == 0 )); then
              echo "_(no CSS assets emitted)_";
            else
              echo "| File | raw (B) | gzip (B) |";
              echo "|------|--------:|---------:|";
              for f in "${css_files[@]}"; do
                raw=$(stat -c '%s' "$f")
                gz=$(gzip -c "$f" | wc -c)
                echo "| \`${f}\` | ${raw} | ${gz} |";
              done
            fi
            echo "";
            echo "</details>";
            echo "";
            echo "<details><summary>Per-file JS (hash:true)</summary>";
            echo "";
            if (( ${#js_files[@]} == 0 )); then
              echo "_(no JS assets emitted)_";
            else
              echo "| File | raw (B) | gzip (B) |";
              echo "|------|--------:|---------:|";
              # 視認性のため raw サイズ降順で並べる。`sort -k` を使うため
              # 一旦 raw / gz / path を tab 区切りで出してから整形する。
              for f in "${js_files[@]}"; do
                raw=$(stat -c '%s' "$f")
                gz=$(gzip -c "$f" | wc -c)
                printf '%s\t%s\t%s\n' "$raw" "$gz" "$f"
              done | sort -k1,1nr | while IFS=$'\t' read -r raw gz f; do
                echo "| \`${f}\` | ${raw} | ${gz} |";
              done
            fi
            echo "";
            echo "</details>";
          } >> "$GITHUB_STEP_SUMMARY"

          # baseline 対比サマリ (CSS / JS / total の 3 行)。baseline が
          # 取得できなかった種別は差分列を `n/a` に縮退する。
          css_raw_diff=$(diff_pct "$base_css_raw" "$hash_css_raw")
          css_gz_diff=$(diff_pct "$base_css_gz" "$hash_css_gz")
          js_raw_diff=$(diff_pct "$base_js_raw" "$hash_js_raw")
          js_gz_diff=$(diff_pct "$base_js_gz" "$hash_js_gz")
          total_raw_diff=$(diff_pct "$base_total_raw" "$hash_total_raw")
          total_gz_diff=$(diff_pct "$base_total_gz" "$hash_total_gz")
          base_css_raw_cell="$base_css_raw"
          base_css_gz_cell="$base_css_gz"
          base_js_raw_cell="$base_js_raw"
          base_js_gz_cell="$base_js_gz"
          base_total_raw_cell="$base_total_raw"
          base_total_gz_cell="$base_total_gz"
          if (( base_css_raw == 0 )); then
            base_css_raw_cell="n/a"
            base_css_gz_cell="n/a"
          fi
          if (( base_js_raw == 0 )); then
            base_js_raw_cell="n/a"
            base_js_gz_cell="n/a"
          fi
          # total baseline は両 kind が揃ったときだけ有効値とする。片方でも
          # 欠落していると hash:true (両 kind 集計) との比較が不公平になる
          # ため、安全側に倒して n/a に縮退する。
          total_baseline_valid=1
          if (( base_css_raw == 0 || base_js_raw == 0 )); then
            total_baseline_valid=0
          fi
          if (( total_baseline_valid == 0 )); then
            base_total_raw_cell="n/a"
            base_total_gz_cell="n/a"
            total_raw_diff="n/a"
            total_gz_diff="n/a"
          fi
          # baseline 対比表は行幅を抑えるため printf '%s\t...' で組み立てて
          # から `| column -t -s $'\t' -o ' | '` で整形…はしない (列幅可変で
          # markdown 表として崩れるリスクがあるため)。代わりに per-cell
          # 変数を短縮名に再代入して echo 1 行を 80 列以内に収める。
          br="$base_css_raw_cell"
          bg="$base_css_gz_cell"
          hr="$hash_css_raw"
          hg="$hash_css_gz"
          dr="$css_raw_diff"
          dg="$css_gz_diff"
          {
            echo "";
            echo "### Baseline (hash:false) vs hash:true (total)";
            echo "";
            echo "| Kind | Metric | baseline (hash:false) | hash:true | diff |";
            echo "|------|--------|----------------------:|----------:|-----:|";
            echo "| CSS  | raw  (B)  | ${br} | ${hr} | ${dr} |";
            echo "| CSS  | gzip (B) | ${bg} | ${hg} | ${dg} |";
          } >> "$GITHUB_STEP_SUMMARY"
          br="$base_js_raw_cell"
          bg="$base_js_gz_cell"
          hr="$hash_js_raw"
          hg="$hash_js_gz"
          dr="$js_raw_diff"
          dg="$js_gz_diff"
          {
            echo "| JS   | raw  (B)  | ${br} | ${hr} | ${dr} |";
            echo "| JS   | gzip (B) | ${bg} | ${hg} | ${dg} |";
          } >> "$GITHUB_STEP_SUMMARY"
          br="$base_total_raw_cell"
          bg="$base_total_gz_cell"
          hr="$hash_total_raw"
          hg="$hash_total_gz"
          dr="$total_raw_diff"
          dg="$total_gz_diff"
          {
            echo "| total | raw  (B)  | ${br} | ${hr} | ${dr} |";
            echo "| total | gzip (B) | ${bg} | ${hg} | ${dg} |";
            if (( base_total_raw == 0 )); then
              echo "";
              echo "_(baseline build produced no assets; baseline = n/a)_";
            elif (( base_css_raw == 0 || base_js_raw == 0 )); then
              echo "";
              echo "_(baseline produced only one kind; missing = n/a)_";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
