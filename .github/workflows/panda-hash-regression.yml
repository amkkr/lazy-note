name: Panda hash:true regression check

# Issue #496 / Issue #475 の検証で、Tripwire テスト 647 件は `hash: true`
# 有効化でも全 pass することが確認済み。ただし bundle size のメリットは
# 小さい (gzip 後 +5.8%) ため本番は `hash: false` (デフォルト) で運用し、
# regression 検知のため手動 (workflow_dispatch) でのみ実行する。
#
# このworkflowは既存 CI に影響を与えないよう push / pull_request トリガーは
# 持たず、workflow_dispatch のみで起動する。panda.config.ts の書き換えは
# CI の working tree 上のみで行い、リポジトリには commit / push しない。

on:
  workflow_dispatch:

# 本 workflow は repo を読むだけで write は不要。明示的に最小権限へ縛る。
permissions:
  contents: read

jobs:
  hash-regression:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0
        with:
          node-version: "24"

      - name: Setup pnpm
        uses: pnpm/action-setup@v6.0.5
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Enable Panda hash:true (temporary in-CI patch)
        # panda.config.ts の defineConfig 内 `preflight: true` 行 (末尾カンマ
        # 任意) 直下に `hash: true,` を 1 行挿入する。リポジトリへは push
        # しない CI 内一時パッチ。挿入後に grep で実在を確認し、未挿入なら
        # 即 fail する。
        #
        # Issue #527: sed / grep のパターンは `preflight: true` の末尾カンマ
        # 有無の両方にマッチするよう `,\?` を付与している。これにより
        # Biome / Prettier 系のフォーマッタが trailing comma を削除する方針に
        # 変わった場合や、誰かが手動でカンマを消した場合でも検出できる。
        # 挿入される行は常に `hash: true,` (カンマあり) で固定する。
        run: |
          set -euo pipefail
          # 末尾カンマの有無両対応で判定する。`hash: true` 単独行のような
          # 部分一致 / 別箇所での hash: true 出現を誤検知しないよう、行頭
          # インデント + key 名 + true + (任意の trailing comma) で限定する。
          if grep -qE '^\s*hash:\s*true,?\s*$' panda.config.ts; then
            echo "panda.config.ts already has hash:true; skip patch."
          else
            sed -i 's/^\(\s*\)preflight: true,\?$/\1preflight: true,\n\1hash: true,/' panda.config.ts
          fi
          if ! grep -qE '^\s*hash:\s*true,?\s*$' panda.config.ts; then
            echo "::error::panda.config.ts への hash:true 挿入に失敗しました。preflight 行の書式が想定 (^\\s*preflight: true,?$) と異なる可能性があります。確認ポイント: (1) preflight 行の末尾カンマ有無 (sed の置換失敗) / (2) preflight 行がコメントアウトされていないか / (3) 別記法 (例: preflight: { enabled: true } 等の object 表記) に変わっていないか / (4) 行頭に空白/タブ以外の文字 (YAML マーカー '-' / CR-LF の CR 混入など) が紛れていないか。"
            exit 1
          fi
          echo "--- panda.config.ts (patched head) ---"
          sed -n '20,35p' panda.config.ts

      - name: Regenerate Panda CSS with hash:true
        run: pnpm prepare

      - name: Run tests with hash:true
        id: tests
        # continue-on-error を付与しないと test 失敗時に job が abort され、
        # 後続の Report ステップ (アノテーション出力) に到達しない。
        continue-on-error: true
        run: pnpm test:run

      - name: Report test regression
        # outcome は continue-on-error 適用前のステップ結果。conclusion は
        # continue-on-error 適用後 (success 扱い) になるため outcome を使う。
        if: steps.tests.outcome == 'failure'
        run: |
          echo "::error::Tripwire テストの hash 耐性に regression があります。data-* 属性が hash 化に追従していない可能性があります。詳細は Issue #496 / Issue #475 / CLAUDE.md の `Panda hash:true の運用判断` を参照してください。"
          exit 1

      - name: Build project with hash:true
        id: build
        # test が失敗した場合は build を走らせない。test 通過時のみ build を
        # 走らせて build regression を切り分ける。
        if: steps.tests.outcome == 'success'
        continue-on-error: true
        # pnpm build は内部で `pnpm run lint && pnpm run test:run && pnpm run
        # type-check && panda && tsc && vite build` を呼ぶため、上の test step
        # と二重実行になる。さらに build 内 test 失敗が build regression として
        # 通知されると原因切り分けが崩れるため、ここでは pnpm exec で生成 /
        # 型チェック / バンドルだけを 1 回ずつ実行する。
        run: pnpm exec panda && pnpm exec tsc && pnpm exec vite build

      - name: Report build regression
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'failure'
        run: |
          echo "::error::hash:true でビルドが失敗しました。Panda 生成物または hook class との整合に regression があります。hash 化された class 名と手書き hook class (index-row-*/copy-btn 等) の衝突可能性も確認してください。"
          exit 1

      - name: Report bundle size (raw / gzip)
        # CLAUDE.md L75 の「gzip 後 +5.8%」トレードオフを CI 上で追跡可能に
        # する。本 step は GITHUB_STEP_SUMMARY に Markdown 表として書き出す
        # のみで、pass/fail 判定には影響しない。閾値での自動 fail は導入せず、
        # 数値の経時変化は手動 (workflow_dispatch) 実行時に Actions UI 上の
        # Summary から目視で確認する運用とする。
        # build が成功した時のみ実行する。test / build いずれかが失敗した
        # 場合は dist/assets が信頼できないため report をスキップする。
        if: steps.tests.outcome == 'success' && steps.build.outcome == 'success'
        run: |
          set -euo pipefail
          # 空 glob ガード: `set -euo pipefail` 下で `for f in dist/assets/*.css`
          # を直接書くと、CSS が 1 件も emit されないケースで glob がリテラル
          # 文字列 `dist/assets/*.css` のまま 1 回ループし、`stat` が非 0 で
          # 終了して job 自体が fail する。これは「pass/fail 判定に影響しない」
          # という本 step の前提に反するため、nullglob で空配列に展開して
          # スキップする。
          shopt -s nullglob
          files=(dist/assets/*.css)
          shopt -u nullglob
          if (( ${#files[@]} == 0 )); then
            {
              echo "## hash:true bundle size";
              echo "";
              echo "_(no CSS assets emitted under dist/assets/*.css)_";
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## hash:true bundle size";
            echo "";
            echo "| File | raw (B) | gzip (B) |";
            echo "|------|---------|----------|";
            for f in "${files[@]}"; do
              raw=$(stat -c '%s' "$f")
              gz=$(gzip -c "$f" | wc -c)
              echo "| \`${f}\` | ${raw} | ${gz} |";
            done
          } >> "$GITHUB_STEP_SUMMARY"
