name: pre-commit-guard tests

# Issue #569: PR #567 (Issue #550) で追加した pre-commit-guard.sh のテスト
# ハーネスを CI に統合し、regression を検出可能にする。
#
# 実行対象は `.claude/hooks/__tests__/pre-commit-guard.test.sh` のみで、
# pnpm install や Panda CSS 生成といった重い手順は不要。shell だけで動くため
# 既存の lint / test workflow とは分離して短時間で完結させる。
#
# harness exit code contract (テスト側と共有):
#   - FAIL > 0  -> harness が exit 1 を返し、本 workflow も即時 fail させる
#   - FAIL == 0 -> harness は exit 0。SKIP 件数は exit code に影響しないため、
#                  別途 TOTAL 行の literal 一致 grep で SKIP 件数 (known-limitation)
#                  の regression を検知する (Issue #569 AC: SKIP 件数を CI 上で固定化)。
#
# トリガーは pull_request のみ。CLAUDE.md で master への直接 commit / push は
# 禁止されており、既存の lint / test workflow (ci.yml / test.yml / a11y.yml /
# playwright.yml) もすべて pull_request トリガーで統一されているため、本
# workflow もそれに揃える。

on:
  pull_request:
    branches: [master]

# 本 workflow は repo を読むだけで write は不要。明示的に最小権限へ縛る。
permissions:
  contents: read

jobs:
  precommit-guard-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Assert .githooks files exist and are executable
        # Issue #592 (Counterpoint 31): git native hook の同梱を CI で保証する。
        # ローカル開発者が hook ファイルを誤って削除した PR を CI で検知できる。
        run: |
          set -uo pipefail
          for hook in .githooks/pre-commit .githooks/commit-msg; do
            if [ ! -f "$hook" ]; then
              echo "::error::Required git native hook is missing: $hook"
              exit 1
            fi
            if [ ! -x "$hook" ]; then
              echo "::error::Required git native hook is not executable: $hook"
              exit 1
            fi
          done

      - name: Run pre-commit-guard test harness
        id: harness
        # harness は失敗時に exit 1 を返す。CI を即時 fail させるため
        # continue-on-error は付けない。
        # 出力は GITHUB_STEP_SUMMARY 用に保存しつつ、ログにも tee する。
        run: |
          set -uo pipefail
          mkdir -p "$RUNNER_TEMP/precommit-guard"
          out_file="$RUNNER_TEMP/precommit-guard/output.txt"
          bash .claude/hooks/__tests__/pre-commit-guard.test.sh \
            | tee "$out_file"
          harness_exit=${PIPESTATUS[0]}
          echo "out_file=$out_file" >> "$GITHUB_OUTPUT"
          echo "harness_exit=$harness_exit" >> "$GITHUB_OUTPUT"
          exit "$harness_exit"

      - name: Assert TOTAL count and FAIL 0 are fixed at expected value
        # Issue #569 AC: 「FAIL 0 / 件数が期待値であることを確認」を字義通り満たす。
        #
        # Issue #592 (Counterpoint 31) で .githooks/pre-commit / .githooks/commit-msg
        # を導入し、旧 known-limitation (SKIP) ラベルは廃止された。E01-E11 は
        # 全件 git native hook 経路で block されるようになったため、harness は
        # FAIL 0 / OK 全件 で完了する想定。
        #
        # harness の TOTAL 行例:
        #   TOTAL: 27  OK: 27  FAIL: 0
        #
        # Issue #649 (Moderate 3) で grep を retrofit:
        #   - 旧: `TOTAL: 27  OK: 27  FAIL: 0` 完全一致
        #   - 新: 「FAIL: 0」+「TOTAL >= 27 (下限固定)」分離型
        #   - 理由: 「新ケースを追加した PR」で TOTAL が増えると workflow 文字列も
        #          同 PR で更新せねばならず、片方を忘れた regression を CI で
        #          検出できなくなる懸念があった。下限 (= MIN_TOTAL) を固定して
        #          上限は開ける運用にすれば、ケース追加時に workflow 更新を
        #          必須にせず、ケース削除 (= 下限割れ) のみを regression として弾ける。
        #
        # 下限 MIN_TOTAL の更新タイミング:
        #   - ケースを追加するだけなら MIN_TOTAL は据え置きで OK。
        #   - ケース削除 / 統合で件数が減る方向に更新する場合は本 step の
        #     MIN_TOTAL を同 PR で減らす (= 新規 baseline の宣言)。
        run: |
          set -uo pipefail
          out_file="${{ steps.harness.outputs.out_file }}"
          if [ -z "$out_file" ] || [ ! -f "$out_file" ]; then
            echo "::error::harness output file not found: $out_file"
            exit 1
          fi
          # 下限: 現在の baseline は 27 (Issue #592 完了時点)。減らす方向のみ
          # 同 PR で更新する。
          MIN_TOTAL=27
          total_line=$(grep -E '^TOTAL:' "$out_file" | head -n1 || true)
          if [ -z "$total_line" ]; then
            echo "::error::harness output に TOTAL 行が見つかりません"
            grep -E '^TOTAL:' "$out_file" || echo "(TOTAL line not found in harness output)"
            exit 1
          fi
          # FAIL: 0 を厳密確認 (regression の主要シグナル)
          if ! printf '%s\n' "$total_line" | grep -qE '(^|[[:space:]])FAIL: 0([[:space:]]|$)'; then
            echo "::error::Expected 'FAIL: 0' in TOTAL line but got: $total_line"
            exit 1
          fi
          # TOTAL 件数を抽出して下限と比較
          total_num=$(printf '%s\n' "$total_line" \
            | sed -nE 's/^TOTAL:[[:space:]]+([0-9]+).*/\1/p')
          if [ -z "$total_num" ]; then
            echo "::error::TOTAL 件数を抽出できません: $total_line"
            exit 1
          fi
          if [ "$total_num" -lt "$MIN_TOTAL" ]; then
            echo "::error::TOTAL ($total_num) が下限 $MIN_TOTAL を下回りました。"
            echo "::error::ケースが意図せず削除された可能性があります。harness を確認するか、"
            echo "::error::意図的な削減であれば本 workflow の MIN_TOTAL も同 PR で更新してください。"
            exit 1
          fi

      - name: Write summary to GITHUB_STEP_SUMMARY
        # harness の成否に関係なく Summary を残す。失敗時は前段で exit 1
        # 済みだが、`if: always()` で実行することで GitHub Actions UI 上に
        # 集計行 (OK / FAIL / SKIP) を表示でき、原因切り分けがしやすい。
        if: always()
        run: |
          set -uo pipefail
          out_file="${{ steps.harness.outputs.out_file }}"
          {
            echo "## pre-commit-guard test harness";
            echo "";
            if [ -n "$out_file" ] && [ -f "$out_file" ]; then
              # TOTAL 行 (例: "TOTAL: 27  OK: 16  FAIL: 0  SKIP(known-limitation): 11")
              # を抽出して目立つ位置に置く。grep が一致しない場合に備えて || true。
              total_line=$(grep -E '^TOTAL:' "$out_file" || true)
              if [ -n "$total_line" ]; then
                echo "### Summary";
                echo "";
                echo "\`\`\`";
                echo "$total_line";
                echo "\`\`\`";
                echo "";
              fi
              echo "### Full output";
              echo "";
              echo "\`\`\`";
              cat "$out_file";
              echo "\`\`\`";
            else
              echo "_(harness output not captured)_";
            fi
          } >> "$GITHUB_STEP_SUMMARY"
