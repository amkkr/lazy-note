<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lazy Note - シンプルで読みやすいブログプラットフォーム。日々の思考やアイデアを気軽に記録・共有できます。" />
    <title>Lazy Note</title>
    <!--
      Newsreader VF (OFL 1.1) を self-host で preload。
      初回描画のフォント遅延を抑制しつつ、`font-display: swap` で FOUT を許容する。
      ライセンス: /fonts/OFL.txt
    -->
    <link
      rel="preload"
      as="font"
      type="font/woff2"
      href="/fonts/Newsreader-VF-Latin.woff2"
      crossorigin="anonymous"
    />
    <script>
      // ダークモード初期化 (FOUC 対策):
      // - localStorage の "theme" が "light" / "dark" の場合は手動設定として優先
      // - それ以外は prefers-color-scheme に従い、localStorage には書き込まない
      //   (system 追従を維持するため未設定状態を保持する)
      try {
        var t = localStorage.getItem("theme");
        if (t !== "light" && t !== "dark") {
          t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
        }
        document.documentElement.dataset.theme = t;
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
